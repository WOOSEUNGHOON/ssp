<div class="member-card">
  <a class="member-image" aria-label="member image">
    <img
      src="{{ include.image | relative_url }}"
      alt="{{ include.title | default: 'member image' }}"
      {% include fallback.html %}
    >
  </a>

  <div class="member-text">
    {{ include.text | markdownify }}
  </div>
</div>
